<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../css/style.css">

        <title>générateur exercice sur les arbres statistiques</title>
    </head>
    <body>
	
		<style>
			table {
				border : solid 1px white;
			}
			
			td {
				border : solid 1px white;
				width:200px;
				height:40px;
				text-align:center;
			}

			body{
				font-size: 1.5em;
			}
			
			.cache {
				display:none;
			}
			
			sub, sup {
				font-size : 0.5em;
			}
			

			#affiche {
			margin:25px 0px 25px 0px;
			}
			
			#reponse .big {
				font-size: 1em;
			}

			.frac{
				display:inline-block;
				margin-left:.1em;margin-right:.1em;
				vertical-align:-64%;
				text-align:center;
				}
				
			.frac > .num, .frac > .den{
				display:inline-block;
				padding:0 .1em;
				}
				
			.frac > .fracbar {
				display:block;
				height:0;margin:0;border:0;
				border-bottom:.1em solid;
				overflow:hidden;
				}
				
			.den{vertical-align:top;}
			
		@media screen and (min-width: 795px) {
			body{
				font-size: 1em;
				}
			}				
			
		</style>
		<header>
			<p><a href="https://maristudy.github.io/MathGretaBTS_CPRP/"> gitpage </a> </p>
		</header>
		<main>
		

			<a href="../index.html">Retour à l'accueil</a>
			<div class="enonce">
				<p>	x<sub>A</sub><sup>2</sup></p>
			</div>
			<p id="affiche">Afficher la réponse</p>
			<div id="reponse" class="cache">
			
			</div>

		</main>
		<footer>

		</footer>
		
		<script>
			


			PA = Math.floor(Math.random()*15) + 25;
			PB = Math.floor(Math.random()*15) + 25;

			
			PAD = Math.floor(Math.random()*6) + 3;
			PBD = Math.floor(Math.random()*6) + 3;
			PCD = Math.floor(Math.random()*10) + 5;

			
			while(PA==PB)
			{
				PB = Math.floor(Math.random()*15) + 25;
			}
			
			while(PAD==PBD)
			{
				PBD = Math.floor(Math.random()*6) + 3;
			}			
			
			while((PAD==PCD)||(PBD==PCD))
			{
				PCD = PCD = Math.floor(Math.random()*10) + 5;
			}
			
			PC = 100 - PA - PB ;
			PTD = ((PA*PAD) + (PB*PBD) + (PC*PCD))/100 ;			
			 
			while((PTD/100).toString().length > 7)
			{
				PCD = PCD = Math.floor(Math.random()*10) + 5;
				PTD = ((PA*PAD) + (PB*PBD) + (PC*PCD))/100 ;

			}
			 
			enonce = document.getElementsByClassName("enonce")[0];
			enonce.innerHTML= ""+
			"Une usine possède 3 machines qui fabriquent la même pièce. <br>On note P(M) la probabilité qu'une pièce soit fabriquée par la machine M. On note PM(D) la probabilité que la pièce produite par la machine M soit défectueuse.  "+
			".<br>On a : P(A) = "+PA/100+" et PA(D) = "+PAD/100+". On a P(B) = "+PB/100+" et PB(D) = "+PBD/100+ 
			".<br>Calculez P(C). <br>(raisonnement/formule:0.5)<br><br><br>(calcul:0.5)<br><br><br>(réponse:0.25)<br><br>"+
			"<br>Sachant que la probabilité qu'une pièce produite soit défectueuse est de "+PTD/100+", calculez PC(D) ?<br>(raisonnement/formule:0.5)<br><br><br><br>(calcul:0.5)<br><br><br><br>(réponse:0.25)<br><br>"+
			"<br>Complétez l'arbre de probabilité avec vos résultats.(0.5 par bonne réponse)<br>"+
			"<img src=\"../images/arbre_stat.png\" alt=\"arbre statistique\" width=\"300px\">";
								
		<!-- <sub> pour indice <sup> pour exposant &infin; symbole infini ; &Delta symbol delta;-->
		<!-- https://www.w3schools.com/html/html_symbols.asp -->
		
			reponse = document.getElementById("reponse");
			reponse.innerHTML= "<img src=\"../images/arbre_stat_c.png\" alt=\"arbre statistique\" width=\"200px\">"+											"<br>P(C) = 1 - "+PA/100+" - "+PB/100+" = "+PC/100+" "+
			"<br>PC(D) : "+PTD/100+" = ( "+PA/100+" x "+PAD/100+") + ( "+PB/100+" x "+PBD/100+" ) + ( "+PC/100+" x PC(D)) <br>=> PC(D) = "+ (( PTD/100 - ((PA*PAD)/10000) - ((PB*PBD)/10000))/(PC/100))+" => "+PCD/100+""+
			"<br>avec P(A) = "+PA/100+" / P(B) = "+PB/100+" / P(C) = "+PC/100+" / PA(D) = "+PAD/100+" / PA(OK) = "+(100-PAD)/100+" <br> PB(D) = "+PBD/100+" / PB(OK) = "+(100-PBD)/100+" / PC(D) = "+PCD/100+" / PC(OK) = "+(100-PCD)/100+
			"</div></div><br><br>";
		

			affiche=document.getElementById("affiche");
			affiche.addEventListener("click",() => {
				document.getElementById("reponse").classList.toggle("cache");
		
			});
			
		</script>
		
	</body>
</html>
