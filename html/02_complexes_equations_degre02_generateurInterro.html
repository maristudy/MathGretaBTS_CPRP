		<script>
		
			let nbEleves = 15;
			
			for(let i=0;i<=nbEleves;i++)
			{

			let a = Math.floor(Math.random()*5) + 3;
			let b = Math.floor(Math.random()*4) + 1;
			let c = Math.floor(Math.random()*6) + 2;

				
			while((b*b)-(4*a*c) >= 0)
			{
				b = Math.floor(Math.random()*4) + 1;
			}
			

			let delta= (b*b)-(4*a*c);
			let r1=(b*(-1))/(2*a);
			let i1=(Math.sqrt(delta*(-1)))/(2*a);

				
				sujet = document.getElementById("sujet");

				reponse = document.createElement("div");
				reponse.setAttribute("class","reponse");
				reponse.innerHTML = "BTS CPRP 1 - équation du second degrés complexes - Correction numéro "+i+"<br><br>" +
"On vous demande de trouver les solutions de l'équation f(z) = 0 ."+
				"<br>(0.5) Donner la formule de &Delta; : &Delta; = (b<sup>2</sup> - 4ac)"+
				"<br>(0.5) Calculer &Delta; en détaillant votre calcul : "+delta+
				"<br>(0.5) Donner le signe de &Delta; : négatif <br>"+
				"(0.5) Donner la formule pour trouver la première solution : ( - b + i &radic;(-&Delta;) ) / 2 a<br> "+
				"(0.5) Détailler le calcul de la première solution sous forme algébrique<br>"+
				"(0.5) Donner la première solution. : "+r1+" + "+i1+" i <br>"+
				"(0.5) Quel lien avons-nous entre les deux solutions : Les solutions sont conjugées <br> "+
				"(0.5) Calculer la seconde solution. : "+r1+" - "+i1+" i<br><br><br><br>"+
				"";
			
				
				//"<p >Pour la conversion hexa vers binaire ( et réciproquement ) on utilise le tableau<br>"+
				//"Pour la conversion du décimal vers une autre base, on utilise les divisions successives ( de 2 pour le binaire et de 16 pour l'hexa )<br>"+
				//"Pour la conversion du binaire vers le décimal, on utilise les puissances de 2 ( ou les puissances de 16 pour l'hexa )</p>";		
				sujet.appendChild(reponse);
				
				divId=document.createElement("div");
				divId.setAttribute("class","identite");
			
				divNom=document.createElement("div");
				divNom.innerHTML="<br>Nom : "
			
				divPrenom=document.createElement("div");
				divPrenom.innerHTML="<br>Prénom : ";

				divId.appendChild(divNom);
				divId.appendChild(divPrenom);
				
				sujet.appendChild(divId);
				
				
				divSujet = document.createElement("div");
				divSujet.setAttribute("class","nbSujet");
				divSujet.innerHTML = "BTS CPRP 1 - équation du second degrés - Sujet numéro "+i;
				
				sujet.appendChild(divSujet);
			
				enonce=document.createElement("div");
			enonce.innerHTML= "Soit la fonction f(x) = "+a+" x<sup>2</sup> + " +b+" x + "+c+" <br>"+
				"On vous demande de trouver les solutions de l'équation f(z) = 0 ."+
				"<br>(0.5) Donner la formule de &Delta; : <br><br><br>"+
				"<br>(0.5) Calculer &Delta; en détaillant votre calcul.<br><br><br><br>"+
				"<br>(0.5) Donner le signe de &Delta; : <br><br><br>"+
				"(0.5) Donner la formule pour trouver la première solution : <br><br><br><br><br> "+
				"(0.5) Détailler le calcul de la première solution sous forme algébrique : <br><br><br><br><br><br>"+
				"(0.5) Donner la première solution : <br><br><br><br>"+
				"(0.5) Quel lien avons-nous entre les deux solutions ?<br><br><br><br> "+
				"(0.5) Calculer la seconde solution.<br>"+
				"";
				
				
				sujet.appendChild(enonce);
				
//				espace=document.createElement("div");

//				sujet.appendChild(espace);


			
			}
