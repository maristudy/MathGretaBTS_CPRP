<script>


		function SaveResultat(nom)
		{
		console.log(localStorage.getItem(sessionStorage.getItem(nom)));
			if(localStorage.getItem(sessionStorage.getItem(nom)) === null )
			{
				resultat=
				[["libelle",sessionStorage.getItem("libelle")],
				["nom",sessionStorage.getItem("nom"),],
				["date",Date(Date.now).toString()],
				["OK",sessionStorage.getItem("OK")],
				["pasOK",sessionStorage.getItem("pasOK")],
				["lost",Number(sessionStorage.getItem("lost"))],
				["win",Number(sessionStorage.getItem("win"))]];
				
				localStorage.setItem(nom,JSON.stringify(resultat));
			}
			else
			{
				resultatStorage=localStorage.getItem(nom);
				resultat=JSON.Parse(resultatStorage);
				
				// modif date
				resultat[2][1]=Date(Date.now).toString();
				// modif OK
				resultat[3][1]=Number(resultat[3][1]) + Number(sessionStorage.getItem("OK"));
				// modif pas OK
				resultat[4][1]=Number(resultat[4][1]) + Number(sessionStorage.getItem("pasOK"));
				// modif lost
				resultat[5][1]=Number(resultat[5][1]) + Number(sessionStorage.getItem("lost"));
				// modif win
				resultat[6][1]=Number(resultat[6][1]) + Number(sessionStorage.getItem("win"));
							
				localStorage.setItem(nom,JSON.stringify(resultat));
			}
		}
		
		
		function AfficheClavier()
		{
			numQuestion=Number(sessionStorage.getItem("numQuestion"));
			listeQuestion=JSON.parse(sessionStorage.getItem("listeQuestion"));
		
			Clavier(listeQuestion[numQuestion][3],"clavier","reponse");
		}

		function Valider()
			{
				question=document.getElementById("question");
				bonneReponse=document.getElementById("bonneReponse");
				conseil=document.getElementById("conseil");
				nomActivite=document.getElementById("nomActivite");
				afficheClavier=document.getElementById("afficheClavier");
				valider=document.getElementById("valider");
				reponse=document.getElementById("reponse");	
				resultat=document.getElementById("resultat");
				clavier=document.getElementById("clavier");
				clavier.textContent="";
				
				numQuestion=Number(sessionStorage.getItem("numQuestion"));
				listeQuestion=JSON.parse(sessionStorage.getItem("listeQuestion"));
			
					if(reponse.textContent==listeQuestion[numQuestion][1])
					{
						resultat.textContent="C'est gagné ! Bravo c'est la bonne réponse";
						bonneReponse.style.display="block";
						conseil.style.display="block";
						reponse.style.display="block";
						resultat.style.display="block";							
						
						sessionStorage.setItem("numQuestion",(Number(sessionStorage.getItem("numQuestion"))+1) );
						sessionStorage.setItem("OK",(Number(sessionStorage.getItem("OK"))+1) );
						sessionStorage.setItem("win",0 );
						sessionStorage.setItem("lost",0 );
						SaveResultat(sessionStorage.getItem("nom"));
						
						if(numQuestion<5)
						{
							questionSuivante=document.getElementById("questionSuivante");
							questionSuivante.style.display="block";
						}
						else{
							rejouer=document.getElementById("rejouer");
							retourMenu=document.getElementById("retourMenu");
							rejouer.style.display="block";
							retourMenu.style.display="block";
						}

					}
					else
					{
						resultat.textContent="perdu";
						bonneReponse.style.display="block";
						conseil.style.display="block";
						reponse.style.display="block";
						resultat.style.display="block";		
						
						sessionStorage.setItem("pasOK",(Number(sessionStorage.getItem("pasOK"))+1) );	
						sessionStorage.setItem("win",0 );
						sessionStorage.setItem("lost",1 );						
						SaveResultat(sessionStorage.getItem("nom"));
						
							rejouer=document.getElementById("rejouer");
							retourMenu=document.getElementById("retourMenu");
							rejouer.style.display="block";
							retourMenu.style.display="block";						
					}
					bonneReponse.textContent=listeQuestion[numQuestion][1];
					conseil.textContent=listeQuestion[numQuestion][2];
				}		
		
		
		
		function initActivite(nom,libelle, questions)
			{

				nomActivite=document.getElementById("nomActivite");
				nomActivite.innerHTML=libelle;
			
				//display none  resultat,bonneReponse,conseil,activites
				question=document.getElementById("question");
				bonneReponse=document.getElementById("bonneReponse");
				conseil=document.getElementById("conseil");
				reponse=document.getElementById("reponse");						
				resultat=document.getElementById("resultat");	
				activites=document.getElementById("activites");		

				question.style.display="none";
				bonneReponse.style.display="none";
				conseil.style.display="none";
				reponse.style.display="none";
				resultat.style.display="none";	
				activites.style.display="none";		

				// init storage
				sessionStorage.setItem("nom",nom);
				sessionStorage.setItem("libelle",libelle);	
				sessionStorage.setItem("numQuestion",0);
				sessionStorage.setItem("listeQuestion",JSON.stringify(questions));	
				sessionStorage.setItem("OK",0);
				sessionStorage.setItem("pasOK",0);				
			} // fin function initActivite(nom,libelle, questions)

		function afficheQuestion()
			{
			
				questionSuivante=document.getElementById("questionSuivante");

				retourMenu=document.getElementById("retourMenu");

				resultat=document.getElementById("resultat");
				bonneReponse=document.getElementById("bonneReponse");
				conseil=document.getElementById("conseil");
				activites=document.getElementById("activites");
				
				
				clavier.textContent="";
				reponse.textContent="";
				
				question.style.display="block";
				bonneReponse.style.display="none";
				conseil.style.display="none";
				reponse.style.display="none";
				resultat.style.display="none";	
				activites.style.display="none";	
				questionSuivante.style.display="none";	
				rejouer.style.display="none";	
				retourMenu.style.display="none";	
				
				valider.removeEventListener("click",AfficheClavier);
				afficheClavier.removeEventListener("click",Valider);
				
				libelle=sessionStorage.getItem("libelle");
				numQuestion=Number(sessionStorage.getItem("numQuestion"));
				
				//numquestion <=5
				
				if(numQuestion < 5)
				{
				nomActivite.innerHTML=libelle+" : question "+(numQuestion+1)+" / 5";

				listeQuestion=JSON.parse(sessionStorage.getItem("listeQuestion"));
				question.innerHTML=questions[numQuestion][0];
						
				Clavier(listeQuestion[numQuestion][3],"clavier","reponse");
				
				afficheClavier.addEventListener("click",AfficheClavier);		
				
				valider.addEventListener("click",Valider);		
				question.style.display="block";		
				reponse.style.display="block";					
				}
				else{
				// fin de partie
				nom=sessionStorage.getItem("nom");
				sessionStorage.setItem("win",1);
				SaveResultat(nom);
				question.textContent="Bravo, vous avez terminé cette partie";
				rejouer.style.display="block";	
				retourMenu.style.display="block";				
				saisieReponse=document.getElementById("saisieReponse");
				clavierValidation=document.getElementById("clavierValidation");		
				saisieReponse.style.display="none";
				clavierValidation.style.display="none";
				}
				
			
			} // fin function afficheQuestion()
